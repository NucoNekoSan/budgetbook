{% load django_htmx %}
{% load static %}
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BudgetBook{% endblock %}</title>
    {% htmx_script %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
    <script>
      window.BudgetChart = {
        getNiceMax: function(value) {
          if (value <= 0) return 1000;
          if (value <= 5000) return Math.ceil(value / 1000) * 1000;
          if (value <= 50000) return Math.ceil(value / 5000) * 5000;
          if (value <= 100000) return Math.ceil(value / 10000) * 10000;
          return Math.ceil(value / 50000) * 50000;
        },
        getStepSize: function(maxValue) {
          if (maxValue <= 1000) return 200;
          if (maxValue <= 5000) return 1000;
          if (maxValue <= 10000) return 2000;
          if (maxValue <= 50000) return 5000;
          if (maxValue <= 100000) return 10000;
          return 50000;
        },
        formatYen: function(value) {
          return '\u00a5' + Number(value).toLocaleString('ja-JP');
        },
        yAxisConfig: function(datasets) {
          var allValues = [].concat.apply([], datasets);
          var absMax = Math.max.apply(null, allValues.map(function(v) { return Math.abs(v); }));
          var niceMax = this.getNiceMax(absMax);
          var step = this.getStepSize(niceMax);
          var self = this;
          return {
            beginAtZero: true,
            suggestedMax: niceMax,
            ticks: {
              stepSize: step,
              precision: 0,
              callback: function(v) { return self.formatYen(v); }
            }
          };
        }
      };
    </script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="{% url 'ledger:dashboard' %}" class="brand">BudgetBook</a>
        <nav class="site-nav">
          <a href="{% url 'ledger:dashboard' %}" class="site-nav__link">家計簿</a>
          <a href="{% url 'ledger:annual' %}" class="site-nav__link">年間</a>
          <a href="{% url 'ledger:expense_breakdown' %}" class="site-nav__link">支出構成</a>
          <a href="{% url 'ledger:settings' %}" class="site-nav__link">設定</a>
          <form method="post" action="{% url 'logout' %}" class="site-nav__logout">
            {% csrf_token %}
            <button type="submit" class="site-nav__link site-nav__logout-btn">
              {{ user.username }} : ログアウト
            </button>
          </form>
        </nav>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
